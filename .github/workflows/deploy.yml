name: Deploy labs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lab1
        working-directory: lab1
        run: npm install

      - name: Build lab1
        working-directory: lab1
        run: npm run build

      - name: Install lab2
        working-directory: lab2
        run: npm install

      - name: Build lab2
        working-directory: lab2
        run: npm run build

      - name: Install lab3
        working-directory: lab3
        run: npm install

      - name: Build lab3
        working-directory: lab3
        run: npm run build

      - name: Compose site
        run: |
          mkdir -p site/lab1 site/lab2 site/lab3
          cp -R lab1/dist/. site/lab1/
          cp -R lab2/dist/. site/lab2/
          cp -R lab3/dist/. site/lab3/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <title>ТКГ — лабораторные</title>
            </head>
            <body>
              <ul>
                <li><a href="./lab1/">Лаб. 1 — GrayBit Image Editor</a></li>
                <li><a href="./lab2/">Лаб. 2 — Цветовые каналы и пипетка</a></li>
                <li><a href="./lab3/">Лаб. 3 — Гистограмма и «Уровни»</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
